<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerolíneas Oceánicas - Portal de Gestión</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        oceanic: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#162b4e', // Primary Base Color
                            600: '#0f1f3a',
                            700: '#0b162a',
                            800: '#070e1b',
                            900: '#04070e',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel CDN for runtime compilation -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #f1f5f9; /* Soft light gray */
            color: #1e293b;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Leaflet Customizations */
        .leaflet-container {
            font-family: 'Outfit', sans-serif !important;
            background: #0b162a !important; /* Premium dark background matching oceanic theme */
        }
        
        /* Custom Glowing/Pulsing Markers */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .marker-pin {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #06b6d4; /* cyan */
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px #06b6d4;
            position: relative;
        }
        .marker-pin::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #06b6d4;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
            opacity: 0;
        }
        .marker-pin.origin {
            background-color: #f97316; /* orange */
            box-shadow: 0 0 10px #f97316;
        }
        .marker-pin.origin::after {
            border-color: #f97316;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Modernized Leaflet Popups */
        .leaflet-popup-content-wrapper {
            background: #0f1f3a !important; /* oceanic-600 */
            color: #f8fafc !important; /* slate-50 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3) !important;
            padding: 4px;
        }
        .leaflet-popup-tip {
            background: #0f1f3a !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leaflet-popup-content {
            margin: 12px 16px !important;
            line-height: 1.5;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root">
        <!-- Loader inicial -->
        <div class="flex flex-col items-center justify-center min-h-screen space-y-4">
            <div class="w-12 h-12 border-4 border-[#162b4e] border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[#162b4e] font-semibold font-sans">Cargando Aerolíneas Oceánicas...</p>
        </div>
    </div>

    <!-- Script principal de React -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
