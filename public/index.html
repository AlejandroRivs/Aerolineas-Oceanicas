<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerolíneas Oceánicas - Portal de Gestión</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        oceanic: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#162b4e', // Primary Base Color
                            600: '#0f1f3a',
                            700: '#0b162a',
                            800: '#070e1b',
                            900: '#04070e',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel CDN for runtime compilation -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- D3.js for geographic maps -->
    <script src="https://unpkg.com/d3@7"></script>
    <style>
        body {
            background-color: #f8fafc; /* Whiter, cleaner slate-50 background */
            color: #0f172a;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root">
        <!-- Loader inicial -->
        <div class="flex flex-col items-center justify-center min-h-screen space-y-4">
            <div class="w-12 h-12 border-4 border-[#162b4e] border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[#162b4e] font-semibold font-sans">Cargando Aerolíneas Oceánicas...</p>
        </div>
    </div>

    <!-- Scripts modulares -->
    <script type="text/babel" src="paises_data.js"></script>
    <script type="text/babel" src="map_components.js"></script>
    <script type="text/babel" src="mapa_interactivo.js"></script>
    <!-- Script principal de React -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
